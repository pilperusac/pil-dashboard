<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard KPIs — PIL Perú 2021–2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.page{max-width:1120px;margin:0 auto;padding:24px 20px}

/* Header */
.header{background:#0f2d5e;border-radius:14px;padding:20px 28px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.header-left{display:flex;align-items:center;gap:14px}
.logo{background:#fff;color:#0f2d5e;font-weight:800;font-size:15px;padding:8px 16px;border-radius:8px;letter-spacing:2px}
.header h1{font-size:17px;font-weight:600;color:#fff;line-height:1.3}
.header p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:3px}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctrl{display:flex;align-items:center;gap:6px}
.ctrl label{font-size:12px;color:rgba(255,255,255,0.7);font-weight:500;white-space:nowrap}
.ctrl select{font-size:13px;padding:7px 12px;border-radius:8px;border:none;background:rgba(255,255,255,0.13);color:#fff;cursor:pointer;outline:none;min-width:90px}
.ctrl select option{background:#1a3a6b;color:#fff}
.ctrl select:hover{background:rgba(255,255,255,0.22)}

/* Tabs */
.tabs{display:flex;gap:4px;background:#fff;border-radius:10px;padding:5px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab{flex:1;padding:9px 10px;border:none;background:none;font-size:13px;font-weight:500;color:#777;cursor:pointer;border-radius:7px;transition:all .15s;white-space:nowrap}
.tab.on{background:#0f2d5e;color:#fff;box-shadow:0 2px 6px rgba(15,45,94,.25)}
.tab:hover:not(.on){background:#f0f2f5;color:#0f2d5e}

/* KPI grid */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
@media(max-width:760px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kcard{background:#fff;border-radius:12px;padding:16px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid #0f2d5e}
.kcard.li-card{border-top-color:#0077b5}
.kcard-ico{width:32px;height:32px;border-radius:8px;background:#e8eef8;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.kcard-ico svg{width:15px;height:15px;stroke:#0f2d5e;fill:none;stroke-width:2}
.kcard.li-card .kcard-ico{background:#e5f1f8}
.kcard.li-card .kcard-ico svg{stroke:#0077b5}
.kcard-lbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-weight:600}
.kcard-val{font-size:24px;font-weight:700;color:#1a1a2e;line-height:1}
.kcard-sub{font-size:11px;color:#aaa;margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:3px 8px;border-radius:20px;margin-top:6px;font-weight:700}
.bg{background:#d1fae5;color:#065f46}
.ba{background:#fef3c7;color:#92400e}
.br{background:#fee2e2;color:#991b1b}
.bb{background:#dbeafe;color:#1e40af}

/* Bench */
.bench-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:580px){.bench-grid{grid-template-columns:1fr}}
.bcard{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.bcard-lbl{font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.bcard-nums{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.bcard-val{font-size:28px;font-weight:700;color:#1a1a2e}
.bcard-tgt{font-size:12px;color:#bbb;background:#f5f5f5;padding:2px 8px;border-radius:6px}
.pbar-bg{background:#f0f2f5;border-radius:20px;height:7px;overflow:hidden;margin-bottom:8px}
.pbar{height:100%;border-radius:20px;transition:width .7s ease}

/* Insights */
.insights{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #0f2d5e}
.insight{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f8f8f8;font-size:13px;color:#555;align-items:flex-start;line-height:1.5}
.insight:last-child{border-bottom:none;padding-bottom:0}
.iico{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;font-weight:700}
.ii-g{background:#d1fae5;color:#065f46}
.ii-a{background:#fef3c7;color:#92400e}
.ii-r{background:#fee2e2;color:#991b1b}
.ii-b{background:#dbeafe;color:#1e40af}
.insight b{font-weight:700;color:#1a1a2e}

/* Section label */
.sec{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.8px;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:#ebebeb}

/* Compare */
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:580px){.comp-grid{grid-template-columns:1fr}}
.cplat{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.cplat-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0f2f5}
.pdot{width:10px;height:10px;border-radius:50%}
.pname{font-size:14px;font-weight:700;color:#1a1a2e}
.srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8f8f8;font-size:13px}
.srow:last-child{border-bottom:none}
.sk{color:#999}
.sv{font-weight:600;color:#1a1a2e}
.sv-g{font-weight:700;color:#065f46}
.sv-a{font-weight:700;color:#92400e}
.sv-r{font-weight:700;color:#991b1b}

/* Chart box */
.cbox{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:16px}
.cbox-title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:3px}
.cbox-sub{font-size:11px;color:#bbb;margin-bottom:12px}
.leg{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.leg span{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.leg i{width:10px;height:10px;border-radius:2px;display:inline-block}
.cw{position:relative;width:100%}

/* Year overview */
.yr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
@media(max-width:700px){.yr-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:440px){.yr-grid{grid-template-columns:1fr}}
.yr-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;border:2px solid transparent;transition:all .15s}
.yr-card:hover{border-color:#0f2d5e}
.yr-card.active{border-color:#0f2d5e;background:#f0f4ff}
.yr-num{font-size:22px;font-weight:800;color:#0f2d5e;margin-bottom:6px}
.yr-stat{font-size:12px;color:#888;display:flex;justify-content:space-between;padding:2px 0}
.yr-stat span:last-child{font-weight:600;color:#333}

/* Table */
.tscroll{overflow-x:auto;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12px;min-width:600px}
thead th{background:#0f2d5e;color:#fff;padding:10px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
thead th:first-child{border-radius:12px 0 0 0}
thead th:last-child{border-radius:0 12px 0 0}
tbody tr:nth-child(even){background:#fafafa}
tbody tr:hover{background:#f0f4ff}
tbody td{padding:9px 12px;border-bottom:1px solid #f0f0f0;color:#333;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pill-g{background:#d1fae5;color:#065f46}
.pill-a{background:#fef3c7;color:#92400e}
.pill-r{background:#fee2e2;color:#991b1b}
.no-data{color:#ccc;font-style:italic}

/* Footer */
.footer{text-align:center;font-size:11px;color:#ccc;margin-top:24px;padding-bottom:16px}

/* Multi-year chart area */
.multi-yr-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.yr-tab{padding:5px 14px;border-radius:20px;font-size:12px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-weight:500;color:#666;transition:all .12s}
.yr-tab.on{background:#0f2d5e;color:#fff;border-color:#0f2d5e}
/* Web section */
.web-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:700px){.web-kpi-row{grid-template-columns:repeat(2,1fr)}}
.wcard{background:#fff;border-radius:12px;padding:16px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid #4285f4}
.wcard-ico{width:30px;height:30px;border-radius:8px;background:#e8f0fe;display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:14px;color:#4285f4}
.wcard-lbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.wcard-val{font-size:22px;font-weight:700;color:#1a1a2e;line-height:1}
.wcard-sub{font-size:11px;margin-top:4px}
.delta-r{color:#991b1b;font-weight:600}
.delta-g{color:#065f46;font-weight:600}
.delta-n{color:#888}
.channel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:580px){.channel-grid{grid-template-columns:1fr}}
.chan-card{background:var(--color-background-secondary,#f9f9f9);border-radius:10px;padding:12px 14px}
.chan-name{font-size:11px;font-weight:700;color:#1a1a2e;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.chan-pct-big{font-size:20px;font-weight:700;color:#1a1a2e}
.chan-sub{font-size:11px;color:#888;margin-top:2px}
.chan-bar-bg{background:#e5e7eb;border-radius:4px;height:4px;margin-top:8px;overflow:hidden}
.chan-bar-fill{height:100%;border-radius:4px}
.kw-table{width:100%;border-collapse:collapse;font-size:12px}
.kw-table th{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.4px;padding:7px 10px;text-align:left;border-bottom:1.5px solid #eee;font-weight:600;white-space:nowrap}
.kw-table td{padding:7px 10px;border-bottom:0.5px solid #f5f5f5;color:#333;vertical-align:middle}
.kw-table tr:last-child td{border-bottom:none}
.kw-table tr:hover td{background:#f8f9ff}
.kw-table td:first-child{font-weight:600;color:#888;width:30px}
.pos-tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}
.pos-1{background:#faeeda;color:#633806}
.pos-top{background:#eaf3de;color:#27500a}
.pos-mid{background:#f0f0f0;color:#555}
.opp-badge{background:#e6f1fb;color:#0c447c;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px}
.visits-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
@media(max-width:560px){.visits-summary{grid-template-columns:1fr 1fr}}
.vs-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);text-align:center}
.vs-yr{font-size:11px;font-weight:700;color:#888;margin-bottom:4px}
.vs-val{font-size:17px;font-weight:700;color:#1a1a2e}
.vs-delta{font-size:10px;margin-top:3px}

/* ── Loading overlay ─────────────────────────────────────────────────────── */
.sync-bar{background:#0f2d5e;border-radius:10px;padding:10px 20px;margin-bottom:14px;
  display:flex;align-items:center;gap:12px;color:#fff;font-size:12px;flex-wrap:wrap}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0;
  animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.sync-dot.loading{background:#f59e0b;animation:spin 1s linear infinite}
.sync-dot.error{background:#ef4444;animation:none}
@keyframes spin{to{transform:rotate(360deg);border-radius:0}}
.sync-label{font-weight:600;font-size:12px}
.sync-time{font-size:11px;opacity:.7;margin-left:auto}
.sync-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;
  padding:5px 12px;font-size:11px;cursor:pointer;font-weight:600;transition:background .15s}
.sync-btn:hover{background:rgba(255,255,255,.25)}
.overlay{position:fixed;inset:0;background:rgba(15,45,94,.85);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.overlay-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
.overlay-text{color:#fff;font-size:14px;font-weight:600}
.overlay-sub{color:rgba(255,255,255,.6);font-size:12px}
</style>
</head>

<div class="page">

<div class="header">
  <div class="header-left">
    <div class="logo">PIL</div>
    <div>
      <h1>Dashboard de KPIs — Redes Sociales</h1>
      <p>Rendimiento mensual Facebook &amp; LinkedIn · PIL Perú S.A.C. · 2021–2026</p>
    </div>
  </div>
  <div class="controls">
    <div class="ctrl">
      <label>Año</label>
      <select id="selYear" onchange="onYearChange()">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>

    <div class="ctrl">
      <label>Mes</label>
      <select id="selMonth" onchange="render()"></select>
    </div>
  </div>
</div>


<div class="sync-bar" id="syncBar">
  <div class="sync-dot loading" id="syncDot"></div>
  <div>
    <div class="sync-label" id="syncLabel">Cargando datos desde Google Sheets...</div>
    <div class="sync-time" id="syncTime"></div>
  </div>
  <button class="sync-btn" onclick="loadAllSheets()" style="margin-left:auto">↻ Actualizar</button>
</div>

<div class="overlay" id="loadingOverlay">
  <div class="overlay-spinner"></div>
  <div class="overlay-text">Conectando con Google Sheets</div>
  <div class="overlay-sub">Cargando datos de PIL Perú...</div>
</div>
<div class="tabs">

  <button class="tab" onclick="switchTab('hist',this)">📈 Histórico</button>
  <button class="tab" onclick="switchTab('multi',this)">🗓️ Multianual</button>
</div>

<div id="pane-fb"></div>
<div id="pane-li" style="display:none"></div>
<div id="pane-comp" style="display:none"></div>
<div id="pane-web" style="display:none"></div>
<div id="pane-hist" style="display:none"></div>
<div id="pane-multi" style="display:none"></div>

<div class="footer">PIL Perú S.A.C. · Dashboard Digital 2021–2026 · Elaborado por Brian Reque Aradiel</div>
</div>

function pct(a,b){return b>0?Math.round(a/b*1000)/10:0;}
function getYear(){return document.getElementById('selYear').value;}
function getMonth(){return document.getElementById('selMonth').value;}
function scls(v,g){return v>=g?'bg':v>=g*.8?'ba':'br';}
function stxt(v,g){return v>=g?'✓ Cumple meta':v>=g*.8?'⚠ Cerca':'✗ Por debajo';}
function pbcol(v,g){return v>=g?'#10b981':v>=g*.8?'#f59e0b':'#ef4444';}
function svCls(v,g){return v>=g?'sv-g':v>=g*.8?'sv-a':'sv-r';}
function pill(v){return `<span class="pill ${v>=BENCH_INT?'pill-g':v>=BENCH_INT*.8?'pill-a':'pill-r'}">${v}%</span>`;}

function populateMonths(){
  const yr=getYear(), sel=document.getElementById('selMonth'), prev=sel.value;
  const keys=Object.keys(DATA.fb[yr]||{});
  sel.innerHTML=keys.map(m=>`<option value="${m}">${m.charAt(0).toUpperCase()+m.slice(1)}</option>`).join('');
  sel.value=keys.includes(prev)?prev:keys[keys.length-1];
}

function buildPane(d, isLI){
  if(!d||(!d.alc&&!d.imp&&!d.int)) return '<p style="padding:2rem;color:#aaa;text-align:center;background:#fff;border-radius:12px">Sin datos detallados para este período.</p>';
  const alcPct=pct(d.alc,d.seg);
  const intPct=isLI?(d.imp>0?pct(d.int,d.imp):0):(d.alc>0?pct(d.int,d.alc):0);
  const intLbl=isLI?'Tasa interacción (imp./int.)':'Tasa interacción (alc./int.)';
  const c=isLI?'li-card':'';
  return `
  <div class="sec">Indicadores del mes</div>
  <div class="kpi-row">
    <div class="kcard ${c}">
      <div class="kcard-ico"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div>
      <div class="kcard-lbl">Seguidores</div>
      <div class="kcard-val">${d.seg.toLocaleString()}</div>
      ${d.nseg!=null?`<span class="badge bg">+${d.nseg} nuevos</span>`:''}
    </div>
    <div class="kcard ${c}">
      <div class="kcard-ico"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
      <div class="kcard-lbl">Impresiones</div>
      <div class="kcard-val">${d.imp!=null?d.imp.toLocaleString():'—'}</div>
      <div class="kcard-sub">Total del período</div>
    </div>
    <div class="kcard ${c}">
      <div class="kcard-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>
      <div class="kcard-lbl">Alcance</div>
      <div class="kcard-val">${d.alc!=null?d.alc.toLocaleString():'—'}</div>
      ${d.seg&&d.alc?`<span class="badge ${scls(alcPct,BENCH_ALC)}">${alcPct}% seg.</span>`:''}
    </div>
    <div class="kcard ${c}">
      <div class="kcard-ico"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
      <div class="kcard-lbl">Interacciones</div>
      <div class="kcard-val">${d.int!=null?d.int:'—'}</div>
      <div class="kcard-sub">Clics · reacciones · compartir</div>
    </div>
    <div class="kcard ${c}">
      <div class="kcard-ico"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg></div>
      <div class="kcard-lbl">Posts</div>
      <div class="kcard-val">${d.posts!=null?d.posts:'—'}</div>
      ${d.posts!=null?`<span class="badge ${d.posts>=3?'bg':d.posts>=1?'ba':'br'}">${d.posts>=3?'Buena frecuencia':d.posts>=1?'Frecuencia baja':'Sin posts'}</span>`:''}
    </div>
  </div>
  <div class="sec">Rendimiento vs benchmark</div>
  <div class="bench-grid">
    <div class="bcard">
      <div class="bcard-lbl">Alcance / seguidores</div>
      <div class="bcard-nums"><div class="bcard-val">${alcPct}%</div><div class="bcard-tgt">meta ≥ ${BENCH_ALC}%</div></div>
      <div class="pbar-bg"><div class="pbar" style="width:${Math.min(100,Math.round(alcPct/BENCH_ALC*100))}%;background:${pbcol(alcPct,BENCH_ALC)}"></div></div>
      <span class="badge ${scls(alcPct,BENCH_ALC)}">${stxt(alcPct,BENCH_ALC)}</span>
    </div>
    <div class="bcard">
      <div class="bcard-lbl">${intLbl}</div>
      <div class="bcard-nums"><div class="bcard-val">${intPct}%</div><div class="bcard-tgt">meta ≥ ${BENCH_INT}%</div></div>
      <div class="pbar-bg"><div class="pbar" style="width:${Math.min(100,Math.round(intPct/BENCH_INT*100))}%;background:${pbcol(intPct,BENCH_INT)}"></div></div>
      <span class="badge ${scls(intPct,BENCH_INT)}">${stxt(intPct,BENCH_INT)}</span>
    </div>
  </div>
  <div class="sec">Análisis</div>
  <div class="insights">

      :`<div class="insight"><div class="iico ii-a">⚠</div><div>Alcance del <b>${alcPct}%</b>, por debajo del objetivo ${BENCH_ALC}%. Publicar en horarios pico y usar contenido más visual puede mejorar este indicador.</div></div>`}

      ?`<div class="insight"><div class="iico ii-r">✗</div><div>Sin publicaciones este mes. La inactividad reduce el alcance orgánico y la presencia de marca.</div></div>`

      ?`<div class="insight"><div class="iico ii-a">⚠</div><div>Solo <b>${d.posts}</b> publicación(es). Mínimo recomendado: 3–4 posts mensuales para mantener visibilidad.</div></div>`
      :`<div class="insight"><div class="iico ii-g">✓</div><div><b>${d.posts}</b> publicaciones — buena frecuencia editorial. Mantener la consistencia refuerza el alcance orgánico.</div></div>`}
    ${intPct>=BENCH_INT

      :`<div class="insight"><div class="iico ii-r">✗</div><div>Tasa de interacción <b>${intPct}%</b> — por debajo del ${BENCH_INT}% objetivo. Usar preguntas, encuestas y llamadas a la acción mejora este KPI.</div></div>`}
    ${d.nseg!=null?`<div class="insight"><div class="iico ii-b">i</div><div><b>+${d.nseg}</b> nuevos seguidores este mes. ${d.nseg>=40?'Crecimiento destacado.':d.nseg>=15?'Crecimiento moderado — mantener frecuencia.':'Crecimiento bajo — evaluar estrategia de captación.'}</div></div>`:''}
  </div>`;
}

    const fbTotAlc=months.reduce((s,m)=>s+(fb[m]&&fb[m].alc||0),0);
    const liTotAlc=months.reduce((s,m)=>s+(li[m]&&li[m].alc||0),0);
    const fbNseg=months.reduce((s,m)=>s+(fb[m]&&fb[m].nseg||0),0);

    {label:String(yr-1),data:months.map(m=>prevV[m]||null),backgroundColor:'#dadce0',borderRadius:5,borderSkipped:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:11}}},
            y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11}}}}}});

  // GSC chart (all available months in year)
  const gscYr=WEB_GSC[yr]||{};
  const gscMonths=Object.keys(gscYr);
  if(gscMonths.length){
    const cGSC=document.getElementById('chartGSC');
    if(cGSC) charts['gsc']=new Chart(cGSC,{type:'bar',data:{
      labels:gscMonths.map(m=>m.charAt(0).toUpperCase()+m.slice(1,3)),
      datasets:[
        {label:'Clics',data:gscMonths.map(m=>gscYr[m].clics),backgroundColor:'#4285f4',borderRadius:5,borderSkipped:false,yAxisID:'y'},
        {label:'Impresiones',data:gscMonths.map(m=>gscYr[m].imp),backgroundColor:'#ea4335',borderRadius:5,borderSkipped:false,yAxisID:'y1'}
      ]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:11}}},
        y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11}},position:'left'},
        y1:{grid:{display:false},ticks:{font:{size:11}},position:'right'}
      }}});
  }

  // Annual totals chart
  const years=[2021,2022,2023,2024,2025,2026];
  const annualTotals=years.map(y=>{
    const d=WEB_VISITS[y]||{};
    return Object.values(d).reduce((s,v)=>s+v,0);
  });
  const cAnual=document.getElementById('chartWebAnual');
  if(cAnual) charts['webAnual']=new Chart(cAnual,{type:'bar',data:{
    labels:years.map(String),
    datasets:[{label:'Visitas',data:annualTotals,
      backgroundColor:years.map(y=>y==yr?'#4285f4':'#b0c4de'),
      borderRadius:6,borderSkipped:false}]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11},callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v}}}}});
}

function render(){
  const yr=getYear(), mo=getMonth();
  const fbD=DATA.fb[yr]&&DATA.fb[yr][mo];
  const liD=DATA.li[yr]&&DATA.li[yr][mo];
  document.getElementById('pane-fb').innerHTML=buildPane(fbD,false);
  document.getElementById('pane-li').innerHTML=buildPane(liD,true);
  document.getElementById('pane-comp').innerHTML=buildComp(fbD,liD);
  document.getElementById('pane-web').innerHTML=buildWeb(yr,mo);
  document.getElementById('pane-hist').innerHTML=buildHist(yr);
  document.getElementById('pane-multi').innerHTML=buildMulti();
  if(activeTab==='comp'&&(fbD||liD)) setTimeout(()=>renderChartComp(fbD,liD),60);
  if(activeTab==='web') setTimeout(()=>renderChartsWeb(yr,mo),60);
  if(activeTab==='hist') setTimeout(()=>renderChartsHist(yr),60);
  if(activeTab==='multi') setTimeout(()=>renderChartsMulti(),60);
}

function switchTab(tab,btn){
  ['fb','li','comp','web','hist','multi'].forEach(t=>document.getElementById('pane-'+t).style.display='none');
  document.getElementById('pane-'+tab).style.display='block';
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  activeTab=tab;
  const yr=getYear(), mo=getMonth();
  if(tab==='comp'){const fb=DATA.fb[yr]&&DATA.fb[yr][mo],li=DATA.li[yr]&&DATA.li[yr][mo];setTimeout(()=>renderChartComp(fb,li),60);}
  if(tab==='web') setTimeout(()=>renderChartsWeb(yr,mo),60);
  if(tab==='hist') setTimeout(()=>renderChartsHist(yr),60);
  if(tab==='multi') setTimeout(()=>renderChartsMulti(),60);
}

function onYearChange(){populateMonths();render();}


// ─── GOOGLE SHEETS AUTO-LOADER ────────────────────────────────────────────
const SHEET_ID = "1x41r1rVgb9kWe1B5pjUzo1izuIkjJLZEI3PmvkdIldE";

function sheetUrl(name){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
}

function normMonth(v){
  if(!v) return null;
  return String(v).toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,'');
}

function fetchCSV(sheetName){
  return new Promise((resolve, reject) => {
    Papa.parse(sheetUrl(sheetName), {
      download: true,
      skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => reject(e)
    });
  });
}

function parseNum(v){
  if(v===null||v===undefined||v==='') return null;
  const n = parseFloat(String(v).replace(/,/g,'.').replace(/[^0-9.-]/g,''));
  return isNaN(n)?null:n;
}

async function loadAllSheets(){
  const dot   = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  const overlay = document.getElementById('loadingOverlay');

  dot.className   = 'sync-dot loading';
  label.textContent = 'Actualizando datos...';
  overlay.style.display = 'flex';

  try {
    // ── Facebook ────────────────────────────────────────────────────────
    const fbRows = await fetchCSV('📘 Facebook_KPIs');
    fbRows.slice(3).forEach(r => {
      const yr  = parseInt(r[0]);
      const mes = normMonth(r[1]);
      if(!yr || !mes) return;
      if(!DATA.fb[yr]) DATA.fb[yr] = {};
      DATA.fb[yr][mes] = {
        seg:  parseNum(r[2]), imp:  parseNum(r[3]),
        alc:  parseNum(r[4]), int:  parseNum(r[5]),
        nseg: parseNum(r[6]), posts:parseNum(r[7])
      };
    });

    // ── LinkedIn ────────────────────────────────────────────────────────
    const liRows = await fetchCSV('💼 LinkedIn_KPIs');
    liRows.slice(3).forEach(r => {
      const yr  = parseInt(r[0]);
      const mes = normMonth(r[1]);
      if(!yr || !mes) return;
      if(!DATA.li[yr]) DATA.li[yr] = {};
      DATA.li[yr][mes] = {
        seg:  parseNum(r[2]), imp:  parseNum(r[3]),
        alc:  parseNum(r[4]), int:  parseNum(r[5]),
        nseg: parseNum(r[6]), posts:parseNum(r[7])
      };
    });

    // ── Web Visitas ─────────────────────────────────────────────────────
    const webRows = await fetchCSV('🌐 Web_Visitas');
    const webHeader = webRows[1]; // ['Mes','2021','2022',...]
    webRows.slice(2).forEach(r => {
      const mes = normMonth(r[0]);
      if(!mes) return;
      [1,2,3,4,5,6].forEach(col => {
        const yr = parseInt(webHeader[col]);
        const val = parseNum(r[col]);
        if(!yr || val===null) return;
        if(!WEB_VISITS[yr]) WEB_VISITS[yr] = {};
        WEB_VISITS[yr][mes] = val;
      });
    });

    // ── GSC SearchConsole ───────────────────────────────────────────────
    const gscRows = await fetchCSV('🔍 GSC_SearchConsole');
    gscRows.slice(2).forEach(r => {
      const yr  = parseInt(r[0]);
      const mes = normMonth(r[1]);
      if(!yr || !mes) return;
      if(!WEB_GSC[yr]) WEB_GSC[yr] = {};
      WEB_GSC[yr][mes] = {
        clics: parseNum(r[2]), imp: parseNum(r[3]),
        ctr:   parseNum(r[4]), posMedia: parseNum(r[5])
      };
    });

    // ── GA4 Analytics ───────────────────────────────────────────────────
    const ga4Rows = await fetchCSV('📊 GA4_Analytics');
    ga4Rows.slice(2).forEach(r => {
      const yr  = parseInt(r[0]);
      const mes = normMonth(r[1]);
      if(!yr || !mes) return;
      if(!WEB_GA4[yr]) WEB_GA4[yr] = {};
      const prev = WEB_GA4[yr][mes]||{};
      WEB_GA4[yr][mes] = {
        usuarios: parseNum(r[2]), nuevos: parseNum(r[3]),
        recurrentes: parseNum(r[4]), tIntMedio: parseNum(r[6]),
        sesInt: parseNum(r[7]), eventos: parseNum(r[8]),
        canales: prev.canales||[]
      };
    });

    // ── Keywords ────────────────────────────────────────────────────────
    const kwRows = await fetchCSV('🔑 GSC_Keywords');
    window.KW_DATA = {};
    kwRows.slice(2).forEach(r => {
      const yr  = parseInt(r[0]);
      const mes = normMonth(r[1]);
      if(!yr || !mes || !r[2]) return;
      const key = yr+'_'+mes;
      if(!KW_DATA[key]) KW_DATA[key] = [];
      KW_DATA[key].push({
        kw:r[2], clics:parseNum(r[3])||0,
        imp:parseNum(r[4])||0, ctr:parseNum(r[5])||0, pos:parseNum(r[6])||0
      });
    });

    // ── Update year selector ─────────────────────────────────────────────
    const allYears = [...new Set([
      ...Object.keys(DATA.fb).map(Number),
      ...Object.keys(DATA.li).map(Number),
      ...Object.keys(WEB_VISITS).map(Number)
    ])].sort((a,b)=>b-a);
    const selYear = document.getElementById('selYear');
    const existing = [...selYear.options].map(o=>parseInt(o.value));
    allYears.forEach(yr => {
      if(!existing.includes(yr)){
        const opt = document.createElement('option');
        opt.value = yr; opt.textContent = yr;
        selYear.insertBefore(opt, selYear.options[0]);
      }
    });

    // ── Success UI ───────────────────────────────────────────────────────
    dot.className   = 'sync-dot';
    label.textContent = '✓ Datos actualizados desde Google Sheets';
    document.getElementById('syncTime').textContent =
      'Última actualización: ' + new Date().toLocaleString('es-PE');

    overlay.style.display = 'none';
    populateMonths();
    render();

  } catch(err) {
    dot.className = 'sync-dot error';
    label.textContent = '✗ Error al conectar con Google Sheets — usando datos locales';
    document.getElementById('syncTime').textContent = err.message || 'Verifica tu conexión a internet';
    overlay.style.display = 'none';
    console.error('Sheets error:', err);
    populateMonths();
    render();
  }
}

// Auto-load on page open
loadAllSheets();
</script>
