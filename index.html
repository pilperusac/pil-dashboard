<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard KPIs — PIL Perú 2021–2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.page{max-width:1120px;margin:0 auto;padding:24px 20px}
.sticky-top{position:sticky;top:0;z-index:500;background:#f0f2f5;padding:12px 0 0;margin:-24px -20px 0;padding-left:20px;padding-right:20px}

/* Header */
.header{background:#0f2d5e;border-radius:14px;padding:20px 28px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.header-left{display:flex;align-items:center;gap:14px}
.logo{background:#fff;color:#0f2d5e;font-weight:800;font-size:15px;padding:8px 16px;border-radius:8px;letter-spacing:2px}
.header h1{font-size:17px;font-weight:600;color:#fff;line-height:1.3}
.header p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:3px}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctrl{display:flex;align-items:center;gap:6px}
.ctrl label{font-size:12px;color:rgba(255,255,255,0.7);font-weight:500;white-space:nowrap}
.ctrl select{font-size:13px;padding:7px 12px;border-radius:8px;border:none;background:rgba(255,255,255,0.13);color:#fff;cursor:pointer;outline:none;min-width:90px}
.ctrl select option{background:#1a3a6b;color:#fff}
.ctrl select:hover{background:rgba(255,255,255,0.22)}

/* Tabs */
.tabs{display:flex;gap:4px;background:#fff;border-radius:10px;padding:5px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab{flex:1;padding:9px 10px;border:none;background:none;font-size:13px;font-weight:500;color:#777;cursor:pointer;border-radius:7px;transition:all .15s;white-space:nowrap}
.tab.on{background:#0f2d5e;color:#fff;box-shadow:0 2px 6px rgba(15,45,94,.25)}
.tab:hover:not(.on){background:#f0f2f5;color:#0f2d5e}

/* KPI grid */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
@media(max-width:760px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kcard{background:#fff;border-radius:12px;padding:16px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid #0f2d5e}
.kcard.li-card{border-top-color:#0077b5}
.kcard-ico{width:32px;height:32px;border-radius:8px;background:#e8eef8;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.kcard-ico svg{width:15px;height:15px;stroke:#0f2d5e;fill:none;stroke-width:2}
.kcard.li-card .kcard-ico{background:#e5f1f8}
.kcard.li-card .kcard-ico svg{stroke:#0077b5}
.kcard-lbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-weight:600}
.kcard-val{font-size:24px;font-weight:700;color:#1a1a2e;line-height:1}
.kcard-sub{font-size:11px;color:#aaa;margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:3px 8px;border-radius:20px;margin-top:6px;font-weight:700}
.bg{background:#d1fae5;color:#065f46}
.ba{background:#fef3c7;color:#92400e}
.br{background:#fee2e2;color:#991b1b}
.bb{background:#dbeafe;color:#1e40af}

/* Bench */
.bench-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:580px){.bench-grid{grid-template-columns:1fr}}
.bcard{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.bcard-lbl{font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.bcard-nums{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.bcard-val{font-size:28px;font-weight:700;color:#1a1a2e}
.bcard-tgt{font-size:12px;color:#bbb;background:#f5f5f5;padding:2px 8px;border-radius:6px}
.pbar-bg{background:#f0f2f5;border-radius:20px;height:7px;overflow:hidden;margin-bottom:8px}
.pbar{height:100%;border-radius:20px;transition:width .7s ease}

/* Insights */
.insights{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #0f2d5e}
.insight{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f8f8f8;font-size:13px;color:#555;align-items:flex-start;line-height:1.5}
.insight:last-child{border-bottom:none;padding-bottom:0}
.iico{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;font-weight:700}
.ii-g{background:#d1fae5;color:#065f46}
.ii-a{background:#fef3c7;color:#92400e}
.ii-r{background:#fee2e2;color:#991b1b}
.ii-b{background:#dbeafe;color:#1e40af}
.insight b{font-weight:700;color:#1a1a2e}

/* Section label */
.sec{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.8px;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:#ebebeb}

/* Compare */
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:580px){.comp-grid{grid-template-columns:1fr}}
.cplat{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.cplat-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0f2f5}
.pdot{width:10px;height:10px;border-radius:50%}
.pname{font-size:14px;font-weight:700;color:#1a1a2e}
.srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8f8f8;font-size:13px}
.srow:last-child{border-bottom:none}
.sk{color:#999}
.sv{font-weight:600;color:#1a1a2e}
.sv-g{font-weight:700;color:#065f46}
.sv-a{font-weight:700;color:#92400e}
.sv-r{font-weight:700;color:#991b1b}

/* Chart box */
.cbox{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:16px}
.cbox-title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:3px}
.cbox-sub{font-size:11px;color:#bbb;margin-bottom:12px}
.leg{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.leg span{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.leg i{width:10px;height:10px;border-radius:2px;display:inline-block}
.cw{position:relative;width:100%}

/* Year overview */
.yr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
@media(max-width:700px){.yr-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:440px){.yr-grid{grid-template-columns:1fr}}
.yr-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;border:2px solid transparent;transition:all .15s}
.yr-card:hover{border-color:#0f2d5e}
.yr-card.active{border-color:#0f2d5e;background:#f0f4ff}
.yr-num{font-size:22px;font-weight:800;color:#0f2d5e;margin-bottom:6px}
.yr-stat{font-size:12px;color:#888;display:flex;justify-content:space-between;padding:2px 0}
.yr-stat span:last-child{font-weight:600;color:#333}

/* Table */
.tscroll{overflow-x:auto;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12px;min-width:600px}
thead th{background:#0f2d5e;color:#fff;padding:10px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
thead th:first-child{border-radius:12px 0 0 0}
thead th:last-child{border-radius:0 12px 0 0}
tbody tr:nth-child(even){background:#fafafa}
tbody tr:hover{background:#f0f4ff}
tbody td{padding:9px 12px;border-bottom:1px solid #f0f0f0;color:#333;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pill-g{background:#d1fae5;color:#065f46}
.pill-a{background:#fef3c7;color:#92400e}
.pill-r{background:#fee2e2;color:#991b1b}
.no-data{color:#ccc;font-style:italic}

/* Footer */
.footer{text-align:center;font-size:11px;color:#ccc;margin-top:24px;padding-bottom:16px}

/* Multi-year chart area */
.multi-yr-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.yr-tab{padding:5px 14px;border-radius:20px;font-size:12px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-weight:500;color:#666;transition:all .12s}
.yr-tab.on{background:#0f2d5e;color:#fff;border-color:#0f2d5e}
/* Web section */
.web-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:700px){.web-kpi-row{grid-template-columns:repeat(2,1fr)}}
.wcard{background:#fff;border-radius:12px;padding:16px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid #4285f4}
.wcard-ico{width:30px;height:30px;border-radius:8px;background:#e8f0fe;display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:14px;color:#4285f4}
.wcard-lbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.wcard-val{font-size:22px;font-weight:700;color:#1a1a2e;line-height:1}
.wcard-sub{font-size:11px;margin-top:4px}
.delta-r{color:#991b1b;font-weight:600}
.delta-g{color:#065f46;font-weight:600}
.delta-n{color:#888}
.channel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:580px){.channel-grid{grid-template-columns:1fr}}
.chan-card{background:var(--color-background-secondary,#f9f9f9);border-radius:10px;padding:12px 14px}
.chan-name{font-size:11px;font-weight:700;color:#1a1a2e;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.chan-pct-big{font-size:20px;font-weight:700;color:#1a1a2e}
.chan-sub{font-size:11px;color:#888;margin-top:2px}
.chan-bar-bg{background:#e5e7eb;border-radius:4px;height:4px;margin-top:8px;overflow:hidden}
.chan-bar-fill{height:100%;border-radius:4px}
.kw-table{width:100%;border-collapse:collapse;font-size:12px}
.kw-table th{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.4px;padding:7px 10px;text-align:left;border-bottom:1.5px solid #eee;font-weight:600;white-space:nowrap}
.kw-table td{padding:7px 10px;border-bottom:0.5px solid #f5f5f5;color:#333;vertical-align:middle}
.kw-table tr:last-child td{border-bottom:none}
.kw-table tr:hover td{background:#f8f9ff}
.kw-table td:first-child{font-weight:600;color:#888;width:30px}
.pos-tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}
.pos-1{background:#faeeda;color:#633806}
.pos-top{background:#eaf3de;color:#27500a}
.pos-mid{background:#f0f0f0;color:#555}
.opp-badge{background:#e6f1fb;color:#0c447c;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px}
.visits-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
@media(max-width:560px){.visits-summary{grid-template-columns:1fr 1fr}}
.vs-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);text-align:center}
.vs-yr{font-size:11px;font-weight:700;color:#888;margin-bottom:4px}
.vs-val{font-size:17px;font-weight:700;color:#1a1a2e}
.vs-delta{font-size:10px;margin-top:3px}

/* ── Sync bar ────────────────────────────────────────────────────────────── */
.sync-bar{background:#0f2d5e;border-radius:10px;padding:10px 20px;margin-bottom:10px;
  display:flex;align-items:center;gap:12px;color:#fff;font-size:12px;flex-wrap:wrap}
.sync-dot{width:9px;height:9px;border-radius:50%;background:#10b981;flex-shrink:0}
.sync-dot.spin{background:#f59e0b;animation:rot 1s linear infinite}
.sync-dot.err{background:#ef4444}
@keyframes rot{to{transform:rotate(360deg);border-radius:0}}
.sync-label{font-weight:600;font-size:12px;flex:1}
.sync-time{font-size:10px;opacity:.65}
.sync-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;
  padding:5px 12px;font-size:11px;cursor:pointer;font-weight:600}
.sync-btn:hover{background:rgba(255,255,255,.25)}
.overlay{position:fixed;inset:0;background:rgba(15,45,94,.88);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.ov-spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:rot .8s linear infinite}
.ov-txt{color:#fff;font-size:14px;font-weight:600}
.ov-sub{color:rgba(255,255,255,.6);font-size:12px}
/* ── Tooltips ─────────────────────────────────────────────────────────────── */
.tip{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;
  border-radius:50%;background:#0f2d5e;color:#fff;font-size:9px;font-weight:700;
  cursor:pointer;margin-left:5px;vertical-align:middle;position:relative;flex-shrink:0;
  transition:background .15s;user-select:none;border:none}
thead .tip{background:rgba(255,255,255,0.25)}
thead .tip:hover{background:rgba(255,255,255,0.5)}
.tip:hover{background:#1a4480}
.tip-box{position:fixed;background:#1a1a2e;color:#fff;font-size:12px;font-weight:400;
  padding:10px 14px;border-radius:8px;max-width:260px;line-height:1.6;z-index:99999;
  box-shadow:0 4px 20px rgba(0,0,0,0.35);pointer-events:none;text-transform:none;
  letter-spacing:0;display:none;border:1px solid rgba(255,255,255,0.1)}
.tip-box.visible{display:block}

/* ── Conversiones & Leads ─────────────────────────────────────────────────── */
.conv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:700px){.conv-grid{grid-template-columns:repeat(2,1fr)}}
.conv-card{background:#fff;border-radius:12px;padding:16px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid #e0e6f0;position:relative}
.conv-card.lead-real{border-top-color:#10b981;background:linear-gradient(135deg,#f0fdf4 0%,#fff 100%)}
.conv-ico{font-size:20px;margin-bottom:6px}
.conv-lbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.conv-val{font-size:22px;font-weight:700;color:#1a1a2e;line-height:1}
.conv-sub{font-size:11px;color:#888;margin-top:3px}
.conv-badge-lead{display:inline-flex;align-items:center;gap:4px;background:#d1fae5;color:#065f46;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:6px;text-transform:uppercase;letter-spacing:.4px}
.lead-rate-box{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #10b981;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.lr-rate{font-size:28px;font-weight:800;color:#065f46}
.lr-desc{font-size:12px;color:#555;line-height:1.5;flex:1}


.grilla-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.grilla-toolbar-title{font-size:13px;font-weight:700;color:#0f2d5e;margin-right:4px;white-space:nowrap}
.gf-select{font-size:12px;padding:6px 10px;border-radius:8px;border:1.5px solid #e0e6f0;background:#f8fafd;color:#1a1a2e;cursor:pointer;outline:none;min-width:100px}
.gf-select:focus{border-color:#0f2d5e}
.gf-input{font-size:12px;padding:6px 10px;border-radius:8px;border:1.5px solid #e0e6f0;background:#f8fafd;color:#1a1a2e;outline:none;min-width:160px;flex:1}
.gf-input:focus{border-color:#0f2d5e}
.gf-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600;transition:all .12s}
.gf-btn-clear{background:#f0f2f5;color:#555}.gf-btn-clear:hover{background:#e0e6f0}
.gf-btn-add{background:#0f2d5e;color:#fff;display:flex;align-items:center;gap:5px}.gf-btn-add:hover{background:#1a4480}
.grilla-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.gstat{background:#fff;border-radius:10px;padding:10px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;min-width:130px}
.gstat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.gstat-info{display:flex;flex-direction:column}
.gstat-num{font-size:20px;font-weight:700;color:#1a1a2e;line-height:1}
.gstat-lbl{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.grilla-count{font-size:12px;color:#888;margin-bottom:10px;padding:0 2px}
.grilla-count b{color:#0f2d5e;font-weight:700}
.grilla-table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.grilla-table{width:100%;border-collapse:collapse;background:#fff;font-size:12px;min-width:820px}
.grilla-table thead th{background:#0f2d5e;color:#fff;padding:10px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.grilla-table thead th:first-child{border-radius:12px 0 0 0}
.grilla-table thead th:last-child{border-radius:0 12px 0 0}
.grilla-table tbody tr:nth-child(even){background:#fafafa}
.grilla-table tbody tr:hover{background:#f0f4ff}
.grilla-table tbody td{padding:9px 12px;border-bottom:1px solid #f0f0f0;color:#333;vertical-align:middle}
.grilla-table tbody tr:last-child td{border-bottom:none}
.cat-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.cat-efemeride{background:#fef3c7;color:#92400e}
.cat-actividad{background:#dbeafe;color:#1e40af}
.cat-proyecto{background:#d1fae5;color:#065f46}
.cat-noticia{background:#f3e8ff;color:#6b21a8}
.est-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;transition:opacity .15s;border:none;outline:none}
.est-badge:hover{opacity:.8}
.est-pendiente{background:#fee2e2;color:#991b1b}
.est-publicado{background:#d1fae5;color:#065f46}
.est-proceso{background:#fef3c7;color:#92400e}
.grilla-no-results{text-align:center;padding:40px 20px;color:#bbb;font-size:13px;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.month-divider td{background:#f0f4ff !important;font-weight:700;font-size:11px;color:#0f2d5e;letter-spacing:.5px;text-transform:uppercase;padding:7px 12px !important;border-bottom:1.5px solid #d0dcf5 !important}
.row-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.grilla-table tbody tr:hover .row-actions{opacity:1}
.act-btn{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .12s}
.act-edit{background:#e8f0fe;color:#1a56db}.act-edit:hover{background:#1a56db;color:#fff}
.act-del{background:#fee2e2;color:#991b1b}.act-del:hover{background:#991b1b;color:#fff}
/* ── Modal overlay ────────────────────────────────────────────────────────── */
.gmodal-bg{position:fixed;inset:0;background:rgba(15,45,94,.55);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.gmodal-bg.hidden{display:none}
.gmodal{background:#fff;border-radius:16px;padding:28px 32px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.25);position:relative;max-height:90vh;overflow-y:auto}
.gmodal-title{font-size:16px;font-weight:700;color:#0f2d5e;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.gmodal-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;border:none;background:#f0f2f5;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#555}
.gmodal-close:hover{background:#e0e6f0}
.gfield{margin-bottom:14px}
.gfield label{display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.gfield input,.gfield select,.gfield textarea{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #e0e6f0;font-size:13px;color:#1a1a2e;outline:none;background:#fafbfd;font-family:inherit;transition:border-color .15s}
.gfield input:focus,.gfield select:focus,.gfield textarea:focus{border-color:#0f2d5e}
.gfield textarea{resize:vertical;min-height:72px}
.gfield-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gmodal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0}
.gbtn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .12s}
.gbtn-cancel{background:#f0f2f5;color:#555}.gbtn-cancel:hover{background:#e0e6f0}
.gbtn-save{background:#0f2d5e;color:#fff}.gbtn-save:hover{background:#1a4480}
.gbtn-del{background:#fee2e2;color:#991b1b}.gbtn-del:hover{background:#991b1b;color:#fff}
/* confirm modal */
.gconfirm-msg{font-size:14px;color:#333;line-height:1.6;margin-bottom:6px}
.gconfirm-detail{font-size:12px;color:#888;background:#f8f8f8;border-radius:8px;padding:10px 14px;margin-top:10px;line-height:1.5}
/* toast */
.gtoast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,.25);transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.gtoast.show{transform:translateY(0);opacity:1}
.gtoast.ok{border-left:4px solid #10b981}
.gtoast.err{border-left:4px solid #ef4444}
.gtoast.warn{border-left:4px solid #f59e0b}
/* saving spinner on badge */
.est-saving{opacity:.5;pointer-events:none}

let activeTab='fb', charts={};

function pct(a,b){return b>0?Math.round(a/b*1000)/10:0;}
function getYear(){return document.getElementById('selYear').value;}
function getMonth(){return document.getElementById('selMonth').value;}
function scls(v,g){return v>=g?'bg':v>=g*.8?'ba':'br';}
function stxt(v,g){return v>=g?'✓ Cumple meta':v>=g*.8?'⚠ Cerca':'✗ Por debajo';}
function pbcol(v,g){return v>=g?'#10b981':v>=g*.8?'#f59e0b':'#ef4444';}
function svCls(v,g){return v>=g?'sv-g':v>=g*.8?'sv-a':'sv-r';}
function pill(v){return `<span class="pill ${v>=BENCH_INT?'pill-g':v>=BENCH_INT*.8?'pill-a':'pill-r'}">${v}%</span>`;}

function populateMonths(){
  const yr=getYear(), sel=document.getElementById('selMonth'), prev=sel.value;
  const keys=Object.keys(DATA.fb[yr]||{});
  sel.innerHTML=keys.map(m=>`<option value="${m}">${m.charAt(0).toUpperCase()+m.slice(1)}</option>`).join('');
  sel.value=keys.includes(prev)?prev:keys[keys.length-1];
}

      <div class="kcard-val">${d.imp!=null?d.imp.toLocaleString():'—'}</div>
      <div class="kcard-sub">Total del período</div>
    </div>
    <div class="kcard ${c}">
      <div class="kcard-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>

    const months=Object.keys(fb);
    const fbTotInt=months.reduce((s,m)=>s+(fb[m]&&fb[m].int||0),0);

    const liNseg=months.reduce((s,m)=>s+(li[m]&&li[m].nseg||0),0);

    const liEndSeg=li[months[months.length-1]]?li[months[months.length-1]].seg:null;

function switchTab(tab,btn){
  ['fb','li','comp','web','hist','multi','grilla'].forEach(t=>document.getElementById('pane-'+t).style.display='none');
  document.getElementById('pane-'+tab).style.display='block';
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  activeTab=tab;
  const yr=getYear(), mo=getMonth();
  // Scroll to just below sticky header when switching tabs
  const stickyH = document.querySelector('.sticky-top')?.offsetHeight || 0;
  window.scrollTo({top: stickyH + 8, behavior:'smooth'});
  if(tab==='comp'){const fb=DATA.fb[yr]&&DATA.fb[yr][mo],li=DATA.li[yr]&&DATA.li[yr][mo];setTimeout(()=>renderChartComp(fb,li),60);}
  if(tab==='web') setTimeout(()=>renderChartsWeb(yr,mo),60);
  if(tab==='hist') setTimeout(()=>renderChartsHist(yr),60);
  if(tab==='multi') setTimeout(()=>renderChartsMulti(),60);
  if(tab==='grilla') renderGrilla();
}

// ─── JSONP LOADER — bypasses CORS from GitHub Pages ──────────────────────
const AS_URL = "https://script.google.com/macros/s/AKfycbx-dOFlDFRD0s4IUpfxKsRKAdevI7DCPOnv8kG9ng2Lu22Z7H9gBMWwlbUXEMpXb0RR/exec";
const SHEETS_TO_LOAD = ['Facebook_KPIs', 'LinkedIn_KPIs', 'Web_Visitas', 'GSC_SearchConsole', 'GA4_Analytics', 'GSC_Keywords', 'Grilla_Contenidos'];

function fetchSheetJSONP(sheetName) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout: ' + sheetName));
    }, 20000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    // Apps Script supports callback param via URL
    script.src = AS_URL + '?sheet=' + encodeURIComponent(sheetName) + '&callback=' + cbName;
    script.onerror = function() { cleanup(); reject(new Error('Script error: ' + sheetName)); };
    document.head.appendChild(script);
  });
}

function n(v) {
  if(v===null||v===undefined||v==='') return null;
  if(typeof v==='number') return isNaN(v)?null:v;
  const x = parseFloat(String(v).replace(/,/g,'.').replace(/[^\d.-]/g,''));
  return isNaN(x)?null:x;
}

function normM(v) {
  if(!v) return null;
  return String(v).toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,'');
}

// ── Sheets write status helpers ────────────────────────────────────────────
function sheetsStatusUpdate(ok, msg) {
  const bar = document.getElementById('sheets-status-bar');
  const dot = document.getElementById('sheets-status-dot');
  const msgEl = document.getElementById('sheets-status-msg');
  if (!bar) return;
  bar.style.display = 'flex';
  dot.style.background = ok ? '#10b981' : '#ef4444';
  msgEl.textContent = msg;
  msgEl.style.color = ok ? '#065f46' : '#991b1b';
}

async function testSheetsWrite() {
  sheetsStatusUpdate(null, '⏳ Probando conexión con Google Sheets...');
  const dot = document.getElementById('sheets-status-dot');
  if (dot) dot.style.background = '#f59e0b';
  try {
    const result = await sheetsWrite({ action: 'ping' });
    if (result && (result.status === 'ok' || result.ok)) {
      sheetsStatusUpdate(true, '✓ Conexión con Sheets OK — escrituras funcionando correctamente.');
    } else {
      sheetsStatusUpdate(false, '⚠ Sheets respondió pero con formato inesperado: ' + JSON.stringify(result).slice(0,80));
    }
  } catch(e) {
    sheetsStatusUpdate(false, '✗ Error de conexión: ' + e.message + ' — verificar que el Apps Script está desplegado y acepta el param "write".');
  }
}

async function loadAll() {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLbl');
  const ov  = document.getElementById('ov');
  dot.className = 'sync-dot spin';
  lbl.textContent = 'Actualizando desde Google Sheets...';
  ov.style.display = 'flex';

  try {
    // ── Limpiar datos locales antes de cargar — así los borrados se reflejan ──
    Object.keys(DATA.fb).forEach(yr => { DATA.fb[yr] = {}; });
    Object.keys(DATA.li).forEach(yr => { DATA.li[yr] = {}; });
    Object.keys(WEB_VISITS).forEach(yr => { delete WEB_VISITS[yr]; });
    Object.keys(WEB_GSC).forEach(yr => { delete WEB_GSC[yr]; });
    Object.keys(WEB_GA4).forEach(yr => { delete WEB_GA4[yr]; });
    Object.keys(WEB_CONVERSIONES).forEach(yr => { delete WEB_CONVERSIONES[yr]; });
    window.KW_DATA = {};

    // ── Facebook ──────────────────────────────────────────────────────
    const fbRaw = await fetchSheetJSONP('Facebook_KPIs');
    if(!Array.isArray(fbRaw)) throw new Error('Facebook_KPIs: ' + (fbRaw.error || JSON.stringify(fbRaw)));
    const fbRows = fbRaw;
    fbRows.slice(3).forEach(r => {
      const yr=parseInt(r[0]), mes=normM(r[1]);
      if(!yr||!mes) return;
      const seg=n(r[2]),imp=n(r[3]),alc=n(r[4]),int=n(r[5]),nseg=n(r[6]),posts=n(r[7]);
      if(seg===null&&alc===null) return;
      if(!DATA.fb[yr]) DATA.fb[yr]={};
      DATA.fb[yr][mes]={seg,imp,alc,int,nseg,posts};
    });

    // ── LinkedIn ──────────────────────────────────────────────────────
    const liRaw = await fetchSheetJSONP('LinkedIn_KPIs');
    if(!Array.isArray(liRaw)) throw new Error('LinkedIn_KPIs: ' + (liRaw.error || JSON.stringify(liRaw)));
    const liRows = liRaw;
    liRows.slice(3).forEach(r => {
      const yr=parseInt(r[0]), mes=normM(r[1]);
      if(!yr||!mes) return;
      const seg=n(r[2]),imp=n(r[3]),alc=n(r[4]),int=n(r[5]),nseg=n(r[6]),posts=n(r[7]);
      if(seg===null&&alc===null) return;
      if(!DATA.li[yr]) DATA.li[yr]={};
      DATA.li[yr][mes]={seg,imp,alc,int,nseg,posts};
    });

    // ── Web Visitas ───────────────────────────────────────────────────
    const webRaw = await fetchSheetJSONP('Web_Visitas');
    if(!Array.isArray(webRaw)) throw new Error('Web_Visitas: ' + (webRaw.error || JSON.stringify(webRaw)));
    const webRows = webRaw;
    const webHdr = webRows[1]||[];
    webRows.slice(2).forEach(r => {
      const mes=normM(r[0]);
      if(!mes||mes==='total') return;
      [1,2,3,4,5,6].forEach(col => {
        const yr=parseInt(webHdr[col]);
        const val=n(r[col]);
        if(!yr||val===null||val===0) return;
        if(!WEB_VISITS[yr]) WEB_VISITS[yr]={};
        WEB_VISITS[yr][mes]=val;
      });
    });

    // ── GSC ───────────────────────────────────────────────────────────
    const gscRaw = await fetchSheetJSONP('GSC_SearchConsole');
    if(!Array.isArray(gscRaw)) throw new Error('GSC_SearchConsole: ' + (gscRaw.error || JSON.stringify(gscRaw)));
    const gscRows = gscRaw;
    gscRows.slice(2).forEach(r => {
      const yr=parseInt(r[0]), mes=normM(r[1]);
      if(!yr||!mes||n(r[2])===null) return;
      if(!WEB_GSC[yr]) WEB_GSC[yr]={};
      WEB_GSC[yr][mes]={clics:n(r[2]),imp:n(r[3]),ctr:n(r[4]),posMedia:n(r[5])};
    });

    // ── GA4 ───────────────────────────────────────────────────────────
    const ga4Raw = await fetchSheetJSONP('GA4_Analytics');
    if(!Array.isArray(ga4Raw)) throw new Error('GA4_Analytics: ' + (ga4Raw.error || JSON.stringify(ga4Raw)));
    const ga4Rows = ga4Raw;

    // ── Parse main GA4 table (rows until "CONVERSIONES" section) ──
    let convSectionStart = -1;
    ga4Rows.slice(2).forEach((r, idx) => {
      // Detect separator row for conversiones section
      if(String(r[0]||'').toUpperCase().includes('CONVERSIONES')) {
        convSectionStart = idx + 2; // +2 for slice offset + skip header row
        return;
      }
      if(convSectionStart > 0) return; // already found, skip
      const yr=parseInt(r[0]), mes=normM(r[1]);
      if(!yr||!mes||n(r[2])===null) return;
      if(!WEB_GA4[yr]) WEB_GA4[yr]={};
      const prev=(WEB_GA4[yr][mes])||{};
      WEB_GA4[yr][mes]={
        usuarios:n(r[2]),nuevos:n(r[3]),recurrentes:n(r[4]),
        tIntMedio:n(r[6]),sesInt:n(r[7]),eventos:n(r[8]),
        canales:prev.canales||[]
      };
    });

    // ── Parse conversiones section (below "CONVERSIONES GA4" title) ──
    // Structure: Año | Mes | WA_ev | WA_usu | Em_ev | Em_usu | GL_ev | GL_usu | FD_ev | FD_usu | TasaLead
    if(convSectionStart > 0) {
      // Find the header row of conversiones (contains "WhatsApp")
      let convHdrIdx = -1;
      for(let i = convSectionStart; i < ga4Rows.length; i++) {
        if(String(ga4Rows[i]&&ga4Rows[i][2]||'').toLowerCase().includes('whatsapp')) {
          convHdrIdx = i + 1; break;
        }
      }
      if(convHdrIdx < 0) convHdrIdx = convSectionStart + 1; // fallback: skip 1 row
      for(let i = convHdrIdx; i < ga4Rows.length; i++) {
        const r = ga4Rows[i];
        const yr=parseInt(r[0]), mes=normM(r[1]);
        if(!yr||!mes) continue;
        const waEv=n(r[2]), waUsu=n(r[3]);
        const emEv=n(r[4]), emUsu=n(r[5]);
        const glEv=n(r[6]), glUsu=n(r[7]);
        const fdEv=n(r[8]), fdUsu=n(r[9]);
        // Only create entry if at least one value exists
        if(waEv===null&&waUsu===null&&emEv===null&&emUsu===null&&
           glEv===null&&glUsu===null&&fdEv===null&&fdUsu===null) continue;
        if(!WEB_CONVERSIONES[yr]) WEB_CONVERSIONES[yr]={};
        WEB_CONVERSIONES[yr][mes]={
          whatsapp_click: {eventos:waEv, usuarios:waUsu},
          email_click:    {eventos:emEv, usuarios:emUsu},
          generate_lead:  {eventos:glEv, usuarios:glUsu},
          file_download:  {eventos:fdEv, usuarios:fdUsu}
        };
      }
    }

    // ── Keywords ──────────────────────────────────────────────────────
    const kwRaw = await fetchSheetJSONP('GSC_Keywords');
    if(!Array.isArray(kwRaw)) throw new Error('GSC_Keywords: ' + (kwRaw.error || JSON.stringify(kwRaw)));
    const kwRows = kwRaw;
    window.KW_DATA={};
    kwRows.forEach(r => {
      const yr=parseInt(r[0]), mes=normM(r[1]);
      if(!yr||isNaN(yr)||!mes||!r[2]||String(r[2]).includes('──')) return;
      const key=yr+'_'+mes;
      if(!KW_DATA[key]) KW_DATA[key]=[];
      const rawCtr = n(r[5])||0;
      // CTR stored as decimal (0.166) → convert to % for display
      const ctrPct = rawCtr > 1 ? rawCtr : rawCtr * 100;
      KW_DATA[key].push({kw:String(r[2]),clics:n(r[3])||0,imp:n(r[4])||0,ctr:ctrPct,pos:n(r[6])||0});
    });
    console.log('KW_DATA keys loaded:', Object.keys(window.KW_DATA));


    // ── Grilla de Contenidos ──────────────────────────────────────────────
    try {
      const grRows = await fetchSheetJSONP('Grilla_Contenidos');
      console.log('DEBUG grRows total:', grRows.length, '| sample row 3:', JSON.stringify(grRows[3]));
      // Find header row (contains "Fecha")
      let hdrIdx = grRows.findIndex(r => r.some(c => String(c).includes('Fecha')));
      if (hdrIdx >= 0) {
        const dataRows = grRows.slice(hdrIdx + 1);
        const loaded = [];
        dataRows.forEach((r, relIdx) => {
          // Skip section separator rows (N° is not a number)
          if (!r[0] || isNaN(parseInt(r[0]))) return;
          const fechaRaw = r[1];
          let fecha = '';
          if (fechaRaw instanceof Date) {
            fecha = fechaRaw.toISOString().slice(0,10);
          } else if (fechaRaw) {
            fecha = String(fechaRaw).slice(0,10);
          }
          // _sheetRow: hdrIdx(0-based) + 1(to skip header) + relIdx + 1(1-indexed) + 1(hdrIdx is 0-based)
          // Simpler: absolute row in sheet = hdrIdx + 1 (header) + relIdx + 1 (1-indexed) = hdrIdx + relIdx + 2
          const sheetRow = hdrIdx + relIdx + 2;
          loaded.push({
            n:         parseInt(r[0]),
            fecha:     fecha,
            dia:       String(r[2]||''),
            semana:    String(r[3]||''),
            mes:       String(r[4]||''),
            categoria: String(r[5]||''),
            tema:      String(r[6]||''),
            formato:   String(r[7]||''),
            red:       String(r[8]||''),
            estado:    String(r[9]||'Pendiente'),
            obs:       String(r[11]||''),
            _sheetRow: sheetRow
          });
        });
        if (loaded.length > 0) {
          // Replace hardcoded data with live data from Sheets
          GRILLA_POSTS.length = 0;
          loaded.forEach(p => GRILLA_POSTS.push(p));
          console.log('Grilla loaded from Sheets:', loaded.length, 'posts. First _sheetRow:', loaded[0]?._sheetRow);
        }
      }
    } catch(grErr) {
      console.warn('Grilla load error (using local data):', grErr.message);
    }

    // ── Update year selector ──────────────────────────────────────────
    const allYrs=[...new Set([
      ...Object.keys(DATA.fb).map(Number),
      ...Object.keys(DATA.li).map(Number),
      ...Object.keys(WEB_VISITS).map(Number)
    ])].sort((a,b)=>b-a);
    const sel=document.getElementById('selYear');
    const existing=[...sel.options].map(o=>parseInt(o.value));
    allYrs.forEach(yr => {
      if(!existing.includes(yr)){
        const o=document.createElement('option');
        o.value=yr; o.textContent=yr;
        sel.insertBefore(o,sel.options[0]);
      }
    });

    // ── Success ───────────────────────────────────────────────────────
    dot.className='sync-dot';
    lbl.textContent='✓ Datos actualizados desde Google Sheets';
    document.getElementById('syncTime').textContent=
      'Última actualización: '+new Date().toLocaleString('es-PE');
    ov.style.display='none';
    populateMonths();
    render();

  } catch(err) {
    console.error('loadAll error:',err);
    dot.className='sync-dot err';
    lbl.textContent='✗ Error: '+err.message;
    document.getElementById('syncTime').textContent='Usando datos locales como respaldo · Verifica el Apps Script y el Spreadsheet ID';
    ov.style.display='none';
    populateMonths();
    render();
  }
}

function fmt(fecha) {
  if(!fecha) return '—';
  const p = fecha.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

// ── Toast notification ──────────────────────────────────────────────────────
function gToast(msg, type='ok', duration=3000) {
  let t = document.getElementById('gtoast');
  if(!t){ t=document.createElement('div'); t.id='gtoast'; t.className='gtoast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.className = `gtoast ${type}`;
  requestAnimationFrame(()=>{ t.classList.add('show'); });
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.classList.remove('show'); }, duration);
}

// ── Sheets write helper ────────────────────────────────────────────────────
async function sheetsWrite(payload) {
  // Apps Script Web Apps no aceptan POST con JSON desde origen externo (CORS).
  // Usamos el mismo patrón JSONP del lector: GET con callback.
  return new Promise((resolve, reject) => {
    const cbName = '_wcb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout escribiendo en Sheets'));
    }, 15000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) {
      cleanup();
      if (data && data.error) reject(new Error(data.error));
      else resolve(data);
    };

    // Serializar payload como query param + callback
    const params = new URLSearchParams({
      write: JSON.stringify(payload),
      callback: cbName
    });
    script.src = AS_URL + '?' + params.toString();
    script.onerror = function() { cleanup(); reject(new Error('Error de red al escribir en Sheets')); };
    document.head.appendChild(script);
  });
}

// ── Stats bar ──────────────────────────────────────────────────────────────
function buildGrillaStats() {
  const byCat = {};
  GRILLA_POSTS.forEach(p => { byCat[p.categoria] = (byCat[p.categoria]||0)+1; });
  const total = GRILLA_POSTS.length;
  return `<div class="grilla-stats">
    ${Object.entries(byCat).map(([cat,n])=>`
    <div class="gstat">
      <div class="gstat-dot" style="background:${CAT_DOTS[cat]||'#888'}"></div>
      <div class="gstat-info"><div class="gstat-num">${n}</div><div class="gstat-lbl">${cat}</div></div>
    </div>`).join('')}
    <div class="gstat" style="margin-left:auto">
      <div class="gstat-dot" style="background:#0f2d5e"></div>
      <div class="gstat-info"><div class="gstat-num">${total}</div><div class="gstat-lbl">Total 2026</div></div>
    </div>
  </div>`;
}

function renderGrilla() {
  const filterMes = document.getElementById('gf-mes')?.value || '';
  const filterCat = document.getElementById('gf-cat')?.value || '';
  const filterEst = document.getElementById('gf-est')?.value || '';
  const filterTxt = (document.getElementById('gf-txt')?.value || '').toLowerCase().trim();

  const filtered = GRILLA_POSTS.filter(p => {
    if(filterMes && p.mes !== filterMes) return false;
    if(filterCat && p.categoria !== filterCat) return false;
    if(filterEst && p.estado !== filterEst) return false;
    if(filterTxt && !p.tema.toLowerCase().includes(filterTxt) &&
       !p.categoria.toLowerCase().includes(filterTxt) &&
       !p.formato.toLowerCase().includes(filterTxt)) return false;
    return true;
  });

  // ── Ordenar siempre por fecha real ──────────────────────────────────────
  filtered.sort((a, b) => {
    const da = a.fecha ? new Date(a.fecha) : new Date('9999-12-31');
    const db = b.fecha ? new Date(b.fecha) : new Date('9999-12-31');
    return da - db;
  });

  // ── Agrupar por mes derivado de la fecha real (no del campo mes) ─────────
  const MESES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                    'Julio','Agosto','Setiembre','Octubre','Noviembre','Diciembre'];
  function mesDesFecha(fechaStr) {
    if(!fechaStr) return 'Sin fecha';
    const d = new Date(fechaStr + 'T00:00:00');
    return isNaN(d) ? 'Sin fecha' : MESES_ES[d.getMonth()];
  }

  let lastMes = null, rows = '';
  filtered.forEach(p => {
    const mesReal = mesDesFecha(p.fecha);
    if(mesReal !== lastMes) {
      rows += `<tr class="month-divider"><td colspan="9">📅 ${mesReal.toUpperCase()}</td></tr>`;
      lastMes = mesReal;
    }
    const catCls = CAT_COLORS[p.categoria]||'';
    const estCls = EST_COLORS[p.estado]||'';
    rows += `<tr>
      <td style="font-weight:600;color:#0f2d5e;width:34px">${p.n}</td>
      <td style="white-space:nowrap;color:#555">${fmt(p.fecha)}<br><span style="font-size:10px;color:#bbb">${p.dia}</span></td>
      <td style="max-width:300px;line-height:1.45">${p.tema}</td>
      <td><span class="cat-badge ${catCls}">${p.categoria}</span></td>
      <td style="color:#777;white-space:nowrap;font-size:11px">${p.formato}</td>
      <td style="color:#888;white-space:nowrap;font-size:11px">LI / FB</td>
      <td style="white-space:nowrap">
        <button class="est-badge ${estCls}" id="est-btn-${p.n}"
          onclick="confirmEstado(${p.n})"
          title="Clic para cambiar estado">${p.estado}</button>
      </td>
      <td style="color:#bbb;font-size:11px">${p.semana}</td>
      <td>
        <div class="row-actions">
          <button class="act-btn act-edit" onclick="openEditModal(${p.n})" title="Editar publicación">✏️</button>
          <button class="act-btn act-del"  onclick="confirmDelete(${p.n})" title="Eliminar publicación">🗑️</button>
        </div>
      </td>
    </tr>`;
  });

  document.getElementById('pane-grilla').innerHTML = `
  <div class="sec">Grilla de Contenidos — PIL Perú 2026</div>
  ${buildGrillaStats()}
  <div id="sheets-status-bar" style="display:none;background:#fff;border-radius:10px;padding:10px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);font-size:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span id="sheets-status-dot" style="width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0"></span>
    <span id="sheets-status-msg" style="flex:1;color:#555">Sincronización con Google Sheets lista.</span>
    <button class="gf-btn gf-btn-clear" style="font-size:11px" onclick="testSheetsWrite()">🔌 Test conexión Sheets</button>
  </div>
  <div class="grilla-toolbar">
    <span class="grilla-toolbar-title">Filtros</span>
    <select class="gf-select" id="gf-mes" onchange="renderGrilla()">
      <option value="">Todos los meses</option>
      ${['Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
        .map(m=>`<option value="${m}" ${filterMes===m?'selected':''}>${m}</option>`).join('')}
    </select>
    <select class="gf-select" id="gf-cat" onchange="renderGrilla()">
      <option value="">Todas las categorías</option>
      ${['Efeméride','Actividad PIL','Proyecto/Servicio','Noticia Web']
        .map(c=>`<option value="${c}" ${filterCat===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <select class="gf-select" id="gf-est" onchange="renderGrilla()">
      <option value="">Todos los estados</option>
      ${['Pendiente','En proceso','Publicado']
        .map(e=>`<option value="${e}" ${filterEst===e?'selected':''}>${e}</option>`).join('')}
    </select>
    <input class="gf-input" id="gf-txt" type="text"
      placeholder="🔍 Buscar por tema, formato..."
      value="${filterTxt}" oninput="renderGrilla()">
    <button class="gf-btn gf-btn-clear" onclick="clearGrillaFilters()">✕ Limpiar</button>
    <button class="gf-btn gf-btn-add" onclick="openAddModal()">＋ Nueva publicación</button>
  </div>
  <div class="grilla-count">Mostrando <b>${filtered.length}</b> de <b>${GRILLA_POSTS.length}</b> publicaciones</div>
  ${filtered.length === 0
    ? `<div class="grilla-no-results">🔍 No se encontraron publicaciones con los filtros aplicados.</div>`
    : `<div class="grilla-table-wrap">
        <table class="grilla-table">
          <thead><tr>
            <th>#</th><th>Fecha</th><th>Tema / Contenido</th><th>Categoría</th>
            <th>Formato</th><th>Redes</th><th>Estado</th><th>Semana</th><th>Acciones</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`}
  ${grillaMod()}`;
}

// ── Modal HTML template ────────────────────────────────────────────────────
function grillaMod() {
  return `
  <!-- Edit/Add Modal -->
  <div class="gmodal-bg hidden" id="gmodal-bg">
    <div class="gmodal">
      <button class="gmodal-close" onclick="closeModal()">✕</button>
      <div class="gmodal-title" id="gmodal-title">✏️ Editar publicación</div>
      <input type="hidden" id="gm-n">
      <div class="gfield-row">
        <div class="gfield">
          <label>Fecha</label>
          <input type="date" id="gm-fecha">
        </div>
        <div class="gfield">
          <label>Mes</label>
          <select id="gm-mes">
            ${['Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
              .map(m=>`<option>${m}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="gfield">
        <label>Tema / Contenido</label>
        <textarea id="gm-tema" rows="3"></textarea>
      </div>
      <div class="gfield-row">
        <div class="gfield">
          <label>Categoría</label>
          <select id="gm-cat">
            ${['Efeméride','Actividad PIL','Proyecto/Servicio','Noticia Web']
              .map(c=>`<option>${c}</option>`).join('')}
          </select>
        </div>
        <div class="gfield">
          <label>Estado</label>
          <select id="gm-est">
            <option>Pendiente</option>
            <option>En proceso</option>
            <option>Publicado</option>
          </select>
        </div>
      </div>
      <div class="gfield-row">
        <div class="gfield">
          <label>Formato</label>
          <select id="gm-formato">
            ${['Imagen + Copy','Foto + Copy','Carrusel de imágenes','Carrusel / Flyer',
               'Imagen + Link al artículo','Galería / Infografía','Video / Imagen + Copy','Infografía']
              .map(f=>`<option>${f}</option>`).join('')}
          </select>
        </div>
        <div class="gfield">
          <label>Semana</label>
          <select id="gm-semana">
            ${['Sem 1','Sem 2','Sem 3','Sem 4','Sem 5'].map(s=>`<option>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="gfield">
        <label>Observaciones (opcional)</label>
        <input type="text" id="gm-obs" placeholder="Notas adicionales...">
      </div>
      <div class="gmodal-footer">
        <button class="gbtn gbtn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="gbtn gbtn-save" onclick="saveModal()">💾 Guardar cambios</button>
      </div>
    </div>
  </div>
  <!-- Confirm Modal -->
  <div class="gmodal-bg hidden" id="gconfirm-bg">
    <div class="gmodal" style="max-width:420px">
      <div class="gmodal-title" id="gconfirm-title">⚠️ Confirmar acción</div>
      <div class="gconfirm-msg" id="gconfirm-msg"></div>
      <div class="gconfirm-detail" id="gconfirm-detail"></div>
      <div class="gmodal-footer">
        <button class="gbtn gbtn-cancel" onclick="closeConfirm()">Cancelar</button>
        <button class="gbtn" id="gconfirm-ok-btn" onclick="confirmOk()">Confirmar</button>
      </div>
    </div>
  </div>`;
}

// ── Modal helpers ──────────────────────────────────────────────────────────
let _confirmAction = null;

function openModal(){ document.getElementById('gmodal-bg').classList.remove('hidden'); }
function closeModal(){ document.getElementById('gmodal-bg').classList.add('hidden'); }
function openConfirm(title, msg, detail, btnLabel, btnCls, action){
  document.getElementById('gconfirm-title').textContent = title;
  document.getElementById('gconfirm-msg').textContent = msg;
  document.getElementById('gconfirm-detail').textContent = detail;
  const btn = document.getElementById('gconfirm-ok-btn');
  btn.textContent = btnLabel;
  btn.className = `gbtn ${btnCls}`;
  _confirmAction = action;
  document.getElementById('gconfirm-bg').classList.remove('hidden');
}
function closeConfirm(){ document.getElementById('gconfirm-bg').classList.add('hidden'); _confirmAction=null; }
function confirmOk(){ closeConfirm(); if(_confirmAction) _confirmAction(); }

// ── Open EDIT modal ────────────────────────────────────────────────────────
function openEditModal(n) {
  const p = GRILLA_POSTS.find(x=>x.n===n);
  if(!p) return;
  document.getElementById('gmodal-title').textContent = `✏️ Editar publicación #${p.n}`;
  document.getElementById('gm-n').value = p.n;
  document.getElementById('gm-fecha').value = p.fecha || '';
  document.getElementById('gm-mes').value = p.mes;
  document.getElementById('gm-tema').value = p.tema;
  document.getElementById('gm-cat').value = p.categoria;
  document.getElementById('gm-est').value = p.estado;
  document.getElementById('gm-formato').value = p.formato;
  document.getElementById('gm-semana').value = p.semana;
  document.getElementById('gm-obs').value = p.obs || '';
  openModal();
  // Auto-update mes when fecha changes
  const fechaInput = document.getElementById('gm-fecha');
  fechaInput.oninput = () => syncMesFromFecha();
  fechaInput.onchange = () => syncMesFromFecha();
}

// ── Open ADD modal ─────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('gmodal-title').textContent = '＋ Nueva publicación';
  document.getElementById('gm-n').value = '';
  document.getElementById('gm-fecha').value = '';
  document.getElementById('gm-mes').value = 'Mayo';
  document.getElementById('gm-tema').value = '';
  document.getElementById('gm-cat').value = 'Actividad PIL';
  document.getElementById('gm-est').value = 'Pendiente';
  document.getElementById('gm-formato').value = 'Foto + Copy';
  document.getElementById('gm-semana').value = 'Sem 1';
  document.getElementById('gm-obs').value = '';
  openModal();
  // Auto-update mes when fecha changes
  const fechaInput = document.getElementById('gm-fecha');
  fechaInput.oninput = () => syncMesFromFecha();
  fechaInput.onchange = () => syncMesFromFecha();
}

function syncMesFromFecha() {
  const MESES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                    'Julio','Agosto','Setiembre','Octubre','Noviembre','Diciembre'];
  const val = document.getElementById('gm-fecha').value;
  if(!val) return;
  const d = new Date(val + 'T00:00:00');
  if(isNaN(d)) return;
  document.getElementById('gm-mes').value = MESES_ES[d.getMonth()];
}

// ── Save modal ─────────────────────────────────────────────────────────────
async function saveModal() {
  const n     = document.getElementById('gm-n').value;
  const fecha = document.getElementById('gm-fecha').value;
  const mes   = document.getElementById('gm-mes').value;
  const tema  = document.getElementById('gm-tema').value.trim();
  const cat   = document.getElementById('gm-cat').value;
  const est   = document.getElementById('gm-est').value;
  const fmt2  = document.getElementById('gm-formato').value;
  const sem   = document.getElementById('gm-semana').value;
  const obs   = document.getElementById('gm-obs').value.trim();

  if(!tema){ gToast('El campo Tema es obligatorio','err'); return; }

  const btn = document.querySelector('#gmodal-bg .gbtn-save');
  btn.textContent = '⏳ Guardando...'; btn.disabled = true;

  if(n) {
    // EDIT existing
    const p = GRILLA_POSTS.find(x=>x.n===parseInt(n));
    if(p){
      p.fecha=fecha; p.mes=mes; p.tema=tema;
      p.categoria=cat; p.estado=est; p.formato=fmt2;
      p.semana=sem; p.obs=obs;
      // Sync all changed fields to Sheets in ONE call (batch)
      if(p._sheetRow) {
        try {
          await sheetsWrite({
            sheet:'Grilla_Contenidos',
            action:'setValues',
            updates:[
              {row:p._sheetRow, col:2,  value:fecha},
              {row:p._sheetRow, col:5,  value:mes},
              {row:p._sheetRow, col:6,  value:cat},
              {row:p._sheetRow, col:7,  value:tema},
              {row:p._sheetRow, col:8,  value:fmt2},
              {row:p._sheetRow, col:10, value:est},
              {row:p._sheetRow, col:12, value:obs}
            ]
          });
          sheetsStatusUpdate(true, `✓ Publicación #${n} sincronizada con Sheets correctamente.`);
          gToast(`✓ Publicación #${n} actualizada en Sheets`,'ok');
        } catch(e){
          sheetsStatusUpdate(false, `✗ Error al escribir en Sheets: ${e.message}`);
          gToast(`Guardado local — fallo Sheets: ${e.message}`,'warn',6000);
        }
      } else {
        gToast(`✓ Publicación #${n} actualizada (sin fila Sheets asignada)`, 'warn');
      }
    }
  } else {
    // ADD new
    const maxN = GRILLA_POSTS.length ? Math.max(...GRILLA_POSTS.map(x=>x.n)) : 0;
    const newPost = { n:maxN+1, fecha, mes, dia:'', semana:sem,
      categoria:cat, tema, formato:fmt2, red:'LinkedIn / Facebook',
      estado:est, obs, _sheetRow:null };
    GRILLA_POSTS.push(newPost);
    // Append row to Sheets
    try {
      await sheetsWrite({
        sheet:'Grilla_Contenidos', action:'append',
        values:[newPost.n, fecha, '', sem, mes, cat, tema, fmt2, 'LinkedIn / Facebook', est, '', obs]
      });
      sheetsStatusUpdate(true, `✓ Nueva publicación #${newPost.n} agregada en Sheets correctamente.`);
      gToast(`✓ Nueva publicación #${newPost.n} agregada`,'ok');
    } catch(e){
      sheetsStatusUpdate(false, `✗ Error al agregar en Sheets: ${e.message} — El Apps Script debe aceptar el parámetro "write" en el doGet().`);
      gToast(`Guardado local — fallo Sheets: ${e.message}`,'warn',6000);
    }
  }

  btn.textContent='💾 Guardar cambios'; btn.disabled=false;
  closeModal();
  renderGrilla();
}

// ── Estado change with confirm ─────────────────────────────────────────────
function confirmEstado(n) {
  const p = GRILLA_POSTS.find(x=>x.n===n);
  if(!p) return;
  const estados = ['Pendiente','En proceso','Publicado'];
  const next = estados[(estados.indexOf(p.estado)+1) % estados.length];
  openConfirm(
    '🔄 Cambiar estado',
    `¿Cambiar el estado de esta publicación?`,
    `#${p.n} — ${p.tema.substring(0,70)}...\n\n${p.estado}  →  ${next}`,
    `Cambiar a "${next}"`,
    next==='Publicado'?'gbtn-save':next==='En proceso'?'gbtn-save':'gbtn-cancel',
    async ()=>{
      const btn = document.getElementById(`est-btn-${n}`);
      if(btn){ btn.classList.add('est-saving'); }
      p.estado = next;
      console.log('DEBUG cycleEstado — p._sheetRow:', p._sheetRow, '| p.n:', p.n);
      if(p._sheetRow){
        try {
          await sheetsWrite({sheet:'Grilla_Contenidos', row:p._sheetRow, col:10, value:next});
          sheetsStatusUpdate(true, `✓ Estado "${next}" sincronizado con Sheets.`);
          gToast(`✓ Estado actualizado: "${next}"`, 'ok');
        } catch(e){
          sheetsStatusUpdate(false, `✗ Error al actualizar estado en Sheets: ${e.message}`);
          gToast(`Estado cambiado local — fallo Sheets: ${e.message}`,'warn',6000);
        }
      } else {
        gToast(`✓ Estado cambiado a "${next}"`, 'ok');
      }
      renderGrilla();
    }
  );
}

// ── Delete with confirm ────────────────────────────────────────────────────
function confirmDelete(n) {
  const p = GRILLA_POSTS.find(x=>x.n===n);
  if(!p) return;
  openConfirm(
    '🗑️ Eliminar publicación',
    '¿Estás seguro de que deseas eliminar esta publicación?',
    `#${p.n} — ${p.tema}\nFecha: ${fmt(p.fecha)} · ${p.mes} · ${p.categoria}`,
    'Sí, eliminar',
    'gbtn-del',
    async ()=>{
      const idx = GRILLA_POSTS.findIndex(x=>x.n===n);
      GRILLA_POSTS.splice(idx,1);
      if(p._sheetRow){
        try {
          await sheetsWrite({sheet:'Grilla_Contenidos', action:'deleteRow', row:p._sheetRow});
          sheetsStatusUpdate(true, `🗑️ Publicación #${n} eliminada de Sheets correctamente.`);
          gToast(`🗑️ Publicación #${n} eliminada de Sheets`, 'ok');
        } catch(e){
          sheetsStatusUpdate(false, `✗ Error al eliminar en Sheets: ${e.message}`);
          gToast(`Eliminado local — fallo Sheets: ${e.message}`,'warn',6000);
        }
      } else {
        gToast(`🗑️ Publicación #${n} eliminada`, 'ok');
      }
      renderGrilla();
    }
  );
}

function clearGrillaFilters() {
  document.getElementById('gf-mes').value = '';
  document.getElementById('gf-cat').value = '';
  document.getElementById('gf-est').value = '';
  document.getElementById('gf-txt').value = '';
  renderGrilla();
}



loadAll();

</script>
<div class="tip-box" id="tipBox"></div>

<script>
// ── Tooltip system ────────────────────────────────────────────────────────
const tipBox = document.getElementById('tipBox');

document.addEventListener('click', function(e) {
  const tip = e.target.closest('.tip');
  if(tip) {
    e.stopPropagation();
    const text = tip.getAttribute('data-tip');
    if(!text) return;
    tipBox.textContent = text;
    tipBox.classList.add('visible');
    // position:fixed so use getBoundingClientRect directly (no scroll offset)
    const rect = tip.getBoundingClientRect();
    let left = rect.left;
    let top  = rect.bottom + 8;
    const boxW = 250;
    if(left + boxW > window.innerWidth - 10) left = window.innerWidth - boxW - 10;
    if(left < 10) left = 10;
    if(top + 80 > window.innerHeight) top = rect.top - 80;
    tipBox.style.left = left + 'px';
    tipBox.style.top  = top + 'px';
  } else {
    tipBox.classList.remove('visible');
  }
});

document.addEventListener('scroll', function() {
  tipBox.classList.remove('visible');
}, true);
</script>
